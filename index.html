<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASH-GOLD-BS | High-Tech Store</title>
    <style>
        :root { --gold: #ffcc00; --neon: #00f2ff; --dark: #0b0b0c; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header-box { border: 2px solid var(--gold); margin-bottom: 40px; padding: 25px; background: linear-gradient(45deg, #1a1a1a, #000); border-radius: 15px; }
        h1 { font-size: 2em; letter-spacing: 5px; margin: 0; text-shadow: 0 0 15px var(--gold); }
        h1 span { color: var(--gold); }
        .subtitle { color: var(--neon); font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #12121a; border: 1px solid #222; border-radius: 15px; padding: 20px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .icon { font-size: 35px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold)); }
        .name { display: block; font-weight: bold; text-transform: uppercase; font-size: 0.85em; margin-bottom: 8px; }
        .price { display: block; color: var(--neon); font-size: 1.2em; font-weight: 800; margin-bottom: 15px; }
        .btn { display: block; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; padding: 10px; border-radius: 5px; font-size: 0.8em; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--gold); color: #000; }
        footer { margin-top: 50px; color: #666; font-size: 0.6em; letter-spacing: 2px; }
    </style>
</head>
